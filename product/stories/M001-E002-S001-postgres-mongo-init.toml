[handoff]
implementation_hints = """
Copy github patterns exactly. Postgres: DROP DATABASE IF EXISTS, CREATE DATABASE, CREATE TABLE, COPY.
MongoDB: client.drop_database(), db[collection].insert_many(). Use content_creator as database name.
"""
reference_files = [
    "src/data-sources/github/postgres_init.sh",
