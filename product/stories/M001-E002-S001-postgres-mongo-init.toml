postgres_init.sh loads ghost_member and ghost_post into Postgres.
mongo_init.py loads mailerlite_subscriber into MongoDB.
"""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
test = "integration"
description = "postgres_init.sh creates content_creator database, ghost_member and ghost_post tables, loads all rows"

